<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batch Rename</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2e2e2e;
      --border-hover: #555;
      --accent: #4f8ef7;
      --accent-dim: #1e3a6e;
      --text: #e8e8e8;
      --text-dim: #888;
      --success: #34d399;
      --error: #f87171;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    header {
      padding: 24px 32px 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    header p {
      color: var(--text-dim);
      font-size: 13px;
      margin-top: 4px;
    }

    .steps {
      display: flex;
      gap: 16px;
      padding: 24px 32px;
      flex: 1;
      min-height: 0;
    }

    .step {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .step-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .step-number {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--border);
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, color 0.2s;
    }

    .step.ready .step-number {
      background: var(--accent);
      color: #fff;
    }

    .step-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      transition: color 0.2s;
    }

    .step.ready .step-label {
      color: var(--text);
    }

    .dropzone {
      flex: 1;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      padding: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .dropzone:hover {
      border-color: var(--border-hover);
      background: #222;
    }

    .dropzone.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .dropzone.filled {
      border-style: solid;
      border-color: var(--accent);
    }

    .dropzone-icon {
      font-size: 28px;
      opacity: 0.4;
    }

    .dropzone.filled .dropzone-icon {
      opacity: 1;
    }

    .dropzone-hint {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.5;
    }

    .dropzone-filename {
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      word-break: break-all;
      display: none;
    }

    .dropzone.filled .dropzone-filename {
      display: block;
    }

    .dropzone.filled .dropzone-hint {
      display: none;
    }

    .dropzone-clear {
      position: absolute;
      top: 8px;
      right: 10px;
      font-size: 16px;
      color: var(--text-dim);
      cursor: pointer;
      display: none;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
    }

    .dropzone-clear:hover {
      color: var(--error);
      background: rgba(248,113,113,0.1);
    }

    .dropzone.filled .dropzone-clear {
      display: block;
    }

    footer {
      padding: 16px 32px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .status {
      flex: 1;
      font-size: 13px;
      color: var(--text-dim);
      min-height: 18px;
    }

    .status.error { color: var(--error); }
    .status.success { color: var(--success); }

    button {
      padding: 9px 24px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
    }

    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    #btn-run {
      background: var(--accent);
      color: #fff;
    }

    #btn-run:not(:disabled):hover {
      background: #6b9ef9;
    }

    /* Preview overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 10;
      align-items: center;
      justify-content: center;
    }

    .overlay.visible {
      display: flex;
    }

    .preview-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 560px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .preview-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 14px;
    }

    .preview-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px;
      font-family: "Menlo", "Monaco", monospace;
      font-size: 11px;
      line-height: 1.8;
    }

    .preview-row { color: var(--text-dim); }
    .preview-row span { color: var(--text); }
    .arrow { color: var(--accent); margin: 0 6px; }

    .preview-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    #btn-cancel {
      background: var(--border);
      color: var(--text);
    }

    #btn-confirm {
      background: var(--accent);
      color: #fff;
    }

    #btn-confirm:hover { background: #6b9ef9; }
    #btn-cancel:hover { background: #3a3a3a; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>Batch Rename</h1>
  <p>Export and rename Final Cut Pro performance clips</p>
</header>

<div class="steps">

  <!-- Step 1 -->
  <div class="step" id="step-1">
    <div class="step-header">
      <div class="step-number">1</div>
      <div class="step-label">Concert Program</div>
    </div>
    <div class="dropzone" id="dz-program">
      <div class="dropzone-clear" onclick="clearZone(event,'program')">×</div>
      <div class="dropzone-icon">🎼</div>
      <div class="dropzone-hint">Drop a PDF or photo<br>of the concert program</div>
      <div class="dropzone-filename" id="name-program"></div>
    </div>
  </div>

  <!-- Step 2 -->
  <div class="step" id="step-2">
    <div class="step-header">
      <div class="step-number">2</div>
      <div class="step-label">Final Cut XML</div>
    </div>
    <div class="dropzone" id="dz-fcpxml">
      <div class="dropzone-clear" onclick="clearZone(event,'fcpxml')">×</div>
      <div class="dropzone-icon">🎬</div>
      <div class="dropzone-hint">Drop the .fcpxml file<br>exported from Final Cut Pro</div>
      <div class="dropzone-filename" id="name-fcpxml"></div>
    </div>
  </div>

  <!-- Step 3 -->
  <div class="step" id="step-3">
    <div class="step-header">
      <div class="step-number">3</div>
      <div class="step-label">Exported Clips</div>
    </div>
    <div class="dropzone" id="dz-clips">
      <div class="dropzone-clear" onclick="clearZone(event,'clips')">×</div>
      <div class="dropzone-icon">🗂️</div>
      <div class="dropzone-hint">Drop the folder of<br>exported video/audio clips</div>
      <div class="dropzone-filename" id="name-clips"></div>
    </div>
  </div>

</div>

<footer>
  <div class="status" id="status"></div>
  <button id="btn-run" disabled onclick="runRename()">Rename Clips</button>
</footer>

<!-- Preview overlay -->
<div class="overlay" id="overlay">
  <div class="preview-card">
    <div class="preview-header" id="preview-header">Preview</div>
    <div class="preview-list" id="preview-list"></div>
    <div class="preview-footer">
      <button id="btn-cancel" onclick="closePreview()">Cancel</button>
      <button id="btn-confirm" onclick="confirmRename()">Confirm Rename</button>
    </div>
  </div>
</div>

<script>
  const state = { program: null, fcpxml: null, clips: null };

  function setStatus(msg, type = '') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status ' + type;
  }

  function updateRunButton() {
    const ready = state.fcpxml && state.clips;
    document.getElementById('btn-run').disabled = !ready;
    if (ready) setStatus('Ready — click Rename Clips to preview');
    else setStatus('');
  }

  function markReady(zone) {
    document.getElementById('dz-' + zone).classList.add('filled');
    document.getElementById('step-' + stepIndex(zone)).classList.add('ready');
    updateRunButton();
  }

  function stepIndex(zone) {
    return { program: 1, fcpxml: 2, clips: 3 }[zone];
  }

  function setFile(zone, path) {
    if (!path) return;
    state[zone] = path;
    const name = path.split('/').pop();
    document.getElementById('name-' + zone).textContent = name;
    markReady(zone);
  }

  function clearZone(e, zone) {
    e.stopPropagation();
    state[zone] = null;
    document.getElementById('name-' + zone).textContent = '';
    document.getElementById('dz-' + zone).classList.remove('filled');
    document.getElementById('step-' + stepIndex(zone)).classList.remove('ready');
    updateRunButton();
  }

  async function chooseFile(zone) {
    const filters = zone === 'program'
      ? [{ name: 'Images & PDFs', extensions: ['pdf','jpg','jpeg','png','heic','webp','tiff'] }]
      : [{ name: 'FCPXML', extensions: ['fcpxml','xml'] }];
    const result = await window.pywebview.api.pick_file(filters);
    if (result) setFile(zone, result);
  }

  async function chooseFolder(zone) {
    const result = await window.pywebview.api.pick_folder();
    if (result) setFile(zone, result);
  }

  // Wait for pywebview API to be ready before allowing interactions
  let apiReady = false;
  window.addEventListener('pywebviewready', () => {
    apiReady = true;
    setStatus('');
  });
  // Show a hint while API loads
  setStatus('Loading…');

  async function chooseFile_safe(zone) {
    if (!apiReady) return;
    return chooseFile(zone);
  }

  async function chooseFolder_safe(zone) {
    if (!apiReady) return;
    return chooseFolder(zone);
  }

  // Rewire dropzone onclick handlers to safe versions
  document.getElementById('dz-program').onclick = () => chooseFile_safe('program');
  document.getElementById('dz-fcpxml').onclick   = () => chooseFile_safe('fcpxml');
  document.getElementById('dz-clips').onclick    = () => chooseFolder_safe('clips');

  // Drag and drop onto dropzones
  function setupDrop(zone) {
    const dz = document.getElementById('dz-' + zone);
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
    dz.addEventListener('drop', e => {
      e.preventDefault();
      dz.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) setFile(zone, file.path);
    });
  }

  ['program','fcpxml','clips'].forEach(setupDrop);

  async function runRename() {
    setStatus('<span class="spinner"></span> Building rename plan…', '');
    document.getElementById('btn-run').disabled = true;

    const result = await window.pywebview.api.build_plan(
      state.program, state.fcpxml, state.clips
    );

    if (result.error) {
      setStatus(result.error, 'error');
      document.getElementById('btn-run').disabled = false;
      return;
    }

    // Show preview
    const list = document.getElementById('preview-list');
    list.innerHTML = '';
    result.pairs.forEach(([src, dst]) => {
      const row = document.createElement('div');
      row.className = 'preview-row';
      row.innerHTML = `<span>${src}</span><span class="arrow">→</span><span>${dst}</span>`;
      list.appendChild(row);
    });

    document.getElementById('preview-header').textContent =
      `Preview — ${result.pairs.length} file${result.pairs.length !== 1 ? 's' : ''} will be renamed`;
    document.getElementById('overlay').classList.add('visible');
  }

  function closePreview() {
    document.getElementById('overlay').classList.remove('visible');
    document.getElementById('btn-run').disabled = false;
    setStatus('');
  }

  async function confirmRename() {
    document.getElementById('btn-confirm').disabled = true;
    document.getElementById('btn-cancel').disabled = true;

    const result = await window.pywebview.api.confirm_rename();

    document.getElementById('overlay').classList.remove('visible');
    document.getElementById('btn-confirm').disabled = false;
    document.getElementById('btn-cancel').disabled = false;
    document.getElementById('btn-run').disabled = false;

    if (result.error) {
      setStatus(result.error, 'error');
    } else {
      setStatus(`✓ Successfully renamed ${result.count} file${result.count !== 1 ? 's' : ''}`, 'success');
    }
  }
</script>
</body>
</html>
